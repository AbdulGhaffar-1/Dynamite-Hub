<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YourBrand VTU – Login / Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="logo">
          <span class="logo-mark">Y</span>
          <span class="logo-text">YourBrand</span>
        </div>
        <p class="auth-tagline">
          Sign in to manage your wallet, buy VTU services and grow your business.
        </p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-auth-tab="login" type="button">
          Login
        </button>
        <button class="auth-tab" data-auth-tab="register" type="button">
          Create account
        </button>
      </div>

      <div class="auth-forms">
        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form active" data-auth-form="login">
          <div class="form-group">
            <label for="loginEmail">Email address</label>
            <input
              type="email"
              id="loginEmail"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <div class="auth-form-row">
            <label class="checkbox">
              <input type="checkbox" name="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="auth-link-small">Forgot password?</a>
          </div>

          <button class="btn btn-primary btn-block" type="submit">
            Login
          </button>

          <p class="auth-form-note">
            New to YourBrand?
            <button
              type="button"
              class="auth-inline-link"
              data-auth-tab="register"
            >
              Create an account
            </button>
          </p>

          <div class="form-message" id="loginMessage" aria-live="polite"></div>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="auth-form" data-auth-form="register">
          <div class="form-group">
            <label for="regFullName">Full name</label>
            <input
              type="text"
              id="regFullName"
              name="fullName"
              placeholder="Your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="regEmail">Email address</label>
            <input
              type="email"
              id="regEmail"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="regPhone">Phone number</label>
            <input
              type="tel"
              id="regPhone"
              name="phone"
              placeholder="e.g. 08012345678"
              required
            />
          </div>

          <div class="form-group">
            <label for="regPassword">Password</label>
            <input
              type="password"
              id="regPassword"
              name="password"
              placeholder="Create a strong password"
              required
            />
          </div>

          <div class="form-group">
            <label for="regConfirmPassword">Confirm password</label>
            <input
              type="password"
              id="regConfirmPassword"
              name="confirmPassword"
              placeholder="Re-type your password"
              required
            />
          </div>

          <p class="auth-terms">
            By creating an account, you agree to our
            <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
          </p>

          <button class="btn btn-primary btn-block" type="submit">
            Create Account
          </button>

          <p class="auth-form-note">
            Already have an account?
            <button
              type="button"
              class="auth-inline-link"
              data-auth-tab="login"
            >
              Login
            </button>
          </p>

          <div class="form-message" id="registerMessage" aria-live="polite"></div>
        </form>
      </div>

      <p class="auth-back-link">
        <a href="index.html">← Back to homepage</a>
      </p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
